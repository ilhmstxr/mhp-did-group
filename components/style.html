<style>
    /* Google Fonts */
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
    
    :root {
        --bg-main: #F4F5F2;
        --bg-card: #FFFFFF;
        --border-color: rgba(0, 0, 0, 0.06);
        --border-hover: rgba(234, 58, 58, 0.25);
        --text-primary: #111827;
        --text-secondary: #4B5563;
        --text-muted: #9CA3AF;
        --color-primary: #EA3A3A;
        --shadow-card: 0 4px 20px 0 rgba(0, 0, 0, 0.02);
        --shadow-hover: 0 12px 30px rgba(234, 58, 58, 0.06);
    }

    html, body, [class*="css"], .stApp {
        font-family: 'Outfit', sans-serif;
    }
    
    /* Title Casing */
    h1, h2, h3, h4, h5, h6 {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        letter-spacing: -0.02em;
    }
    
    /* Background adjustments */
    .stApp {
        background-color: var(--bg-main);
        color: var(--text-primary);
    }
    
    /* Sidebar adjustment */
    section[data-testid="stSidebar"] {
        background-color: #FFFFFF !important;
        border-right: 1px solid var(--border-color);
    }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
    }
    ::-webkit-scrollbar-track {
        background: var(--bg-main);
    }
    ::-webkit-scrollbar-thumb {
        background: #E5E7EB;
        border-radius: 9999px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: var(--color-primary);
    }
    
    /* Glassmorphic Cards replacement (Clean Flat-White Cards) */
    div.element-container:has(div.metric-card) {
        margin-bottom: 1rem;
    }
    
    /* Custom container */
    .glass-card {
        background: var(--bg-card);
        border-radius: 16px;
        padding: 24px;
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow-card);
        margin-bottom: 20px;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
        overflow: hidden;
    }
    
    /* KPI Card hover effect */
    .kpi-card {
        background: var(--bg-card);
        border-radius: 16px;
        padding: 22px;
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow-card);
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
        overflow: hidden;
        text-align: left;
    }
    
    .kpi-card:hover, .glass-card:hover {
        transform: translateY(-4px);
        border-color: var(--border-hover);
        box-shadow: var(--shadow-hover);
    }
    
    .kpi-card-cyan:hover, .kpi-card-pink:hover {
        border-color: var(--border-hover);
        box-shadow: var(--shadow-hover);
    }

    /* Subheader Styling */
    .section-title {
        color: var(--text-primary);
        border-left: 4px solid var(--color-primary);
        padding-left: 14px;
        margin-top: 36px;
        margin-bottom: 20px;
        font-weight: 700;
        font-size: 20px;
        letter-spacing: -0.01em;
        line-height: 1.2;
    }
    
    /* Metric label and values */
    .kpi-label {
        font-size: 11px;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 600;
    }
    
    .kpi-value {
        font-size: 24px;
        color: var(--text-primary);
        font-weight: 800;
        margin-top: 6px;
        letter-spacing: -0.02em;
        white-space: nowrap;
    }
    
    .kpi-sub {
        font-size: 12.5px;
        color: var(--text-secondary);
        margin-top: 8px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 4px;
    }
    
    /* Interactive badges */
    .badge {
        padding: 4px 10px;
        border-radius: 9999px;
        font-size: 11px;
        font-weight: 600;
        display: inline-block;
        letter-spacing: 0.02em;
        transition: all 0.2s ease;
    }
    .badge:hover {
        transform: scale(1.05);
    }
    .badge-vip-diamond {
        background-color: rgba(234, 58, 58, 0.08);
        color: var(--color-primary);
        border: 1px solid rgba(234, 58, 58, 0.2);
    }
    .badge-vip-gold {
        background-color: rgba(245, 158, 11, 0.08);
        color: #D97706;
        border: 1px solid rgba(245, 158, 11, 0.2);
    }
    .badge-regular {
        background-color: rgba(107, 114, 128, 0.06);
        color: #4B5563;
        border: 1px solid rgba(107, 114, 128, 0.15);
    }

    /* List styling */
    .insight-list {
        list-style: none;
        padding-left: 0 !important;
        margin-top: 12px !important;
    }
    .insight-list li {
        position: relative;
        padding-left: 20px;
        margin-bottom: 10px;
        font-size: 13.5px;
        color: var(--text-secondary);
        line-height: 1.5;
    }
    .insight-list li::before {
        content: "✦";
        position: absolute;
        left: 0;
        color: var(--color-primary);
        font-weight: bold;
    }

    /* Fade-in Animation */
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(12px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .glass-card, .kpi-card {
        animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* Custom table styles for premium feel */
    .custom-table-container {
        background: #FFFFFF;
        border-radius: 16px;
        border: 1px solid rgba(0, 0, 0, 0.05);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
        overflow: hidden;
        margin-bottom: 20px;
    }
    table.custom-table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
    }
    table.custom-table th {
        background: #F9FAFB;
        padding: 14px 18px;
        font-size: 11px;
        font-weight: 700;
        color: #4B5563;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }
    table.custom-table td {
        padding: 14px 18px;
        font-size: 13.5px;
        color: #111827;
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        vertical-align: middle;
    }
    table.custom-table tr:last-child td {
        border-bottom: none;
    }
    table.custom-table tr:hover td {
        background: rgba(234, 58, 58, 0.015);
    }
</style>
