<div class="kpi-card" style="min-height: 120px; display: flex; flex-direction: column; justify-content: space-between;">
    <div style="display: flex; justify-content: space-between; align-items: flex-start; width: 100%;">
        <div>
            <div class="kpi-label">Total Hari Rental</div>
            <div class="kpi-value" style="color: #111827;">{total_days:,} <span style="font-size: 16px; font-weight: 500; color: #EA3A3A;">Hari</span></div>
        </div>
        <div style="width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: rgba(234, 58, 58, 0.06); border: 1.5px solid rgba(234, 58, 58, 0.15); border-radius: 12px; flex-shrink: 0; margin-left: 10px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#EA3A3A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
        </div>
    </div>
    <div class="kpi-sub" style="color: #4B5563; margin-top: 10px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#EA3A3A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 2px;">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        Akumulasi durasi sewa armada
    </div>
</div>
